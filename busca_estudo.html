<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Busca De Estudos Biblicos</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Source+Sans+3:wght@400;600;700&display=swap');

    :root {
      --bg: #ece4d5;
      --paper: #f8f4ea;
      --ink: #211c18;
      --muted: #6d6258;
      --line: #d5c8b5;
      --accent: #8a5a2b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Source Sans 3', sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 85% 10%, #e3d5be 0%, transparent 38%),
        radial-gradient(circle at 10% 90%, #d9cab0 0%, transparent 35%),
        var(--bg);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .panel {
      width: min(880px, 100%);
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 16px 32px rgba(0, 0, 0, 0.12);
      padding: 26px;
    }

    .account-menu-wrap {
      margin-bottom: 12px;
      display: flex;
      justify-content: flex-end;
    }

    h1 {
      margin: 0;
      font-family: 'Cormorant Garamond', serif;
      font-size: 42px;
      letter-spacing: 0.4px;
    }

    .subtitle {
      margin: 4px 0 18px;
      color: var(--muted);
      font-size: 18px;
    }

    form {
      display: grid;
      grid-template-columns: 1.3fr 1fr 1fr auto;
      gap: 10px;
      align-items: end;
    }

    label {
      display: grid;
      gap: 4px;
      font-size: 14px;
      color: #5f544b;
      font-weight: 600;
    }

    select,
    input,
    button {
      height: 44px;
      border-radius: 10px;
      border: 1px solid var(--line);
      font-size: 16px;
      padding: 0 12px;
      font-family: inherit;
      background: #fffdf8;
      color: var(--ink);
    }

    button {
      background: #2f2418;
      color: #f8f2e7;
      border-color: #2f2418;
      font-weight: 700;
      cursor: pointer;
      min-width: 140px;
    }

    button:hover { filter: brightness(1.07); }

    .result {
      margin-top: 16px;
      border-top: 1px solid var(--line);
      padding-top: 14px;
      color: #4f463f;
      min-height: 46px;
    }

    .result strong { color: #2f2418; }

    .hint {
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
    }

    .studies-title {
      margin: 18px 0 8px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
      font-size: 14px;
      letter-spacing: 0.7px;
      color: #6a5e53;
      text-transform: uppercase;
      font-weight: 700;
    }

    .studies-list {
      display: grid;
      gap: 8px;
    }

    .study-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      background: #fffdf8;
    }

    .study-meta {
      min-width: 0;
    }

    .study-ref {
      margin: 0;
      font-size: 13px;
      color: #776b61;
      letter-spacing: 0.2px;
    }

    .study-name {
      margin: 2px 0 0;
      font-size: 16px;
      font-weight: 700;
      color: #2f2418;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .study-open {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #2f2418;
      background: #2f2418;
      color: #f8f2e7;
      text-decoration: none;
      border-radius: 8px;
      height: 34px;
      padding: 0 10px;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .studies-empty {
      border: 1px dashed var(--line);
      border-radius: 10px;
      padding: 12px;
      color: var(--muted);
      font-size: 14px;
      background: rgba(255, 255, 255, 0.55);
    }

    .study-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .star-btn {
      width: 38px;
      height: 38px;
      border: 1px solid var(--line);
      background: #fffdf8;
      border-radius: 10px;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      color: #c9b48a;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .star-btn.done {
      color: #e0a92b;
      border-color: #e0a92b;
      background: #fff7e6;
    }

    .star-btn:hover { filter: brightness(1.03); }

    .section-count { font-weight: 400; color: #9a8c7c; }

    @media (max-width: 860px) {
      form { grid-template-columns: 1fr; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>Busca De Estudos Biblicos</h1>
    <p class="subtitle">Escolha livro, capitulo e versiculo para abrir o estudo.</p>

    <form id="form-busca">
      <label>
        Livro
        <select id="livro" required></select>
      </label>

      <label>
        Capitulo
        <input id="capitulo" type="number" min="1" step="1" required />
      </label>

      <label>
        Versiculo
        <input id="versiculo" type="number" min="1" step="1" required />
      </label>

      <button type="submit">Abrir Estudo</button>
    </form>

    <div class="result" id="resultado"></div>
    <p class="hint">Regra: se voce buscar, por exemplo, versiculo 3 e existir um estudo 1-5, o sistema abre esse estudo.</p>

    <p class="hint" id="progress-hint">Entre na sua conta (menu no topo) para marcar estudos como concluidos.</p>

    <h2 class="studies-title">Estudos Pendentes <span class="section-count" id="count-pendentes"></span></h2>
    <section class="studies-list" id="lista-pendentes"></section>

    <h2 class="studies-title">Estudos Realizados <span class="section-count" id="count-realizados"></span></h2>
    <section class="studies-list" id="lista-realizados"></section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="auth_widget.js"></script>

  <script>
    let estudos = [];
    let currentUser = null;
    let completedSet = new Set();
    const params = new URLSearchParams(window.location.search);

    const supaConfig = window.BIBLIA_SUPABASE_CONFIG || {};
    const supaClient = (window.supabase && supaConfig.url && supaConfig.anonKey)
      ? window.supabase.createClient(supaConfig.url, supaConfig.anonKey)
      : null;

    function buildStudyHref(estudo) {
      const page = 'layout_novo.html';
      return page + '?estudoId=' + encodeURIComponent(estudo.id);
    }

    async function carregarIndice() {
      const res = await fetch('estudos_index.json');
      if (!res.ok) {
        throw new Error('Nao foi possivel ler estudos_index.json');
      }
      const data = await res.json();
      estudos = Array.isArray(data.estudos) ? data.estudos : [];
      popularLivros();
      await refreshCompletions();
      renderListaEstudos();
    }

    async function refreshCompletions() {
      completedSet = new Set();
      if (!supaClient || !currentUser) {
        return;
      }
      try {
        const res = await supaClient.from('study_completions').select('study_id').eq('user_id', currentUser.id);
        if (res.error) throw res.error;
        (res.data || []).forEach(function (row) { completedSet.add(row.study_id); });
      } catch (err) {
        // silencioso: mantem lista de concluidos vazia
      }
    }

    function ordenarEstudos(lista) {
      return [...lista].sort((a, b) => {
        const livroComp = String(a.livro).localeCompare(String(b.livro), 'pt-BR');
        if (livroComp !== 0) return livroComp;
        const capComp = Number(a.capitulo) - Number(b.capitulo);
        if (capComp !== 0) return capComp;
        return Number(a.versiculoInicio) - Number(b.versiculoInicio);
      });
    }

    function studyItemHtml(estudo, done) {
      const ref = estudo.livro + ' ' + estudo.capitulo + ':' + estudo.versiculoInicio + '-' + estudo.versiculoFim;
      const href = buildStudyHref(estudo);
      const starTitle = currentUser
        ? (done ? 'Desmarcar como concluido' : 'Marcar como concluido')
        : 'Entre para marcar';
      return (
        '<article class="study-item">' +
          '<div class="study-meta">' +
            '<p class="study-ref">' + ref + '</p>' +
            '<p class="study-name">' + estudo.titulo + '</p>' +
          '</div>' +
          '<div class="study-actions">' +
            '<button type="button" class="star-btn' + (done ? ' done' : '') + '" data-id="' + estudo.id + '" title="' + starTitle + '" aria-label="' + starTitle + '">' + (done ? '\u2605' : '\u2606') + '</button>' +
            '<a class="study-open" href="' + href + '">Abrir</a>' +
          '</div>' +
        '</article>'
      );
    }

    function renderListaEstudos() {
      const pendEl = document.getElementById('lista-pendentes');
      const doneEl = document.getElementById('lista-realizados');
      const countPend = document.getElementById('count-pendentes');
      const countDone = document.getElementById('count-realizados');
      const hint = document.getElementById('progress-hint');
      if (!pendEl || !doneEl) {
        return;
      }

      if (hint) {
        hint.style.display = currentUser ? 'none' : 'block';
      }

      if (!estudos.length) {
        pendEl.innerHTML = '<div class="studies-empty">Nenhum estudo cadastrado ainda.</div>';
        doneEl.innerHTML = '';
        if (countPend) countPend.textContent = '';
        if (countDone) countDone.textContent = '';
        return;
      }

      const ordenados = ordenarEstudos(estudos);
      const pendentes = ordenados.filter(function (e) { return !completedSet.has(e.id); });
      const realizados = ordenados.filter(function (e) { return completedSet.has(e.id); });

      pendEl.innerHTML = pendentes.length
        ? pendentes.map(function (e) { return studyItemHtml(e, false); }).join('')
        : '<div class="studies-empty">Nenhum estudo pendente.</div>';

      doneEl.innerHTML = realizados.length
        ? realizados.map(function (e) { return studyItemHtml(e, true); }).join('')
        : '<div class="studies-empty">Nenhum estudo concluido ainda.</div>';

      if (countPend) countPend.textContent = '(' + pendentes.length + ')';
      if (countDone) countDone.textContent = '(' + realizados.length + ')';

      [pendEl, doneEl].forEach(function (container) {
        container.querySelectorAll('.star-btn').forEach(function (btn) {
          btn.addEventListener('click', function () { toggleCompletion(btn.getAttribute('data-id')); });
        });
      });
    }

    async function toggleCompletion(studyId) {
      const resultado = document.getElementById('resultado');
      if (!supaClient || !currentUser) {
        if (resultado) resultado.innerHTML = 'Entre na sua conta (menu no topo) para marcar estudos como concluidos.';
        return;
      }
      const isDone = completedSet.has(studyId);
      try {
        if (isDone) {
          const del = await supaClient.from('study_completions').delete().eq('user_id', currentUser.id).eq('study_id', studyId);
          if (del.error) throw del.error;
          completedSet.delete(studyId);
        } else {
          const ins = await supaClient.from('study_completions').upsert({ user_id: currentUser.id, study_id: studyId }, { onConflict: 'user_id,study_id' });
          if (ins.error) throw ins.error;
          completedSet.add(studyId);
        }
        renderListaEstudos();
      } catch (err) {
        if (resultado) resultado.textContent = 'Falha ao atualizar progresso: ' + (err.message || 'erro desconhecido');
      }
    }

    function popularLivros() {
      const select = document.getElementById('livro');
      const livros = [...new Set(estudos.map(e => e.livro))].sort((a, b) => a.localeCompare(b, 'pt-BR'));
      select.innerHTML = livros.map(l => '<option value="' + l + '">' + l + '</option>').join('');

      const livroParam = params.get('livro');
      const capituloParam = params.get('capitulo');
      const versiculoParam = params.get('versiculo');
      if (livroParam && livros.includes(livroParam)) {
        select.value = livroParam;
      }
      if (capituloParam) {
        document.getElementById('capitulo').value = capituloParam;
      }
      if (versiculoParam) {
        document.getElementById('versiculo').value = versiculoParam;
      }
    }

    function buscarEstudo(livro, capitulo, versiculo) {
      const candidatos = estudos
        .filter(e =>
          e.livro.toLowerCase() === livro.toLowerCase() &&
          Number(e.capitulo) === Number(capitulo) &&
          Number(versiculo) >= Number(e.versiculoInicio) &&
          Number(versiculo) <= Number(e.versiculoFim)
        )
        .sort((a, b) => {
          const spanA = Number(a.versiculoFim) - Number(a.versiculoInicio);
          const spanB = Number(b.versiculoFim) - Number(b.versiculoInicio);
          return spanA - spanB;
        });

      return candidatos[0] || null;
    }

    function mostrarNaoEncontrado(livro, capitulo, versiculo) {
      const resultado = document.getElementById('resultado');
      const faixas = estudos
        .filter(e => e.livro.toLowerCase() === livro.toLowerCase() && Number(e.capitulo) === Number(capitulo))
        .map(e => e.versiculoInicio + '-' + e.versiculoFim)
        .join(', ');

      if (faixas) {
        resultado.innerHTML = 'Nenhum estudo cobre <strong>' + livro + ' ' + capitulo + ':' + versiculo + '</strong>. Faixas disponiveis neste capitulo: <strong>' + faixas + '</strong>.';
      } else {
        resultado.innerHTML = 'Nenhum estudo cadastrado para <strong>' + livro + ' ' + capitulo + '</strong> ainda.';
      }
    }

    document.getElementById('form-busca').addEventListener('submit', (event) => {
      event.preventDefault();

      const livro = document.getElementById('livro').value;
      const capitulo = Number(document.getElementById('capitulo').value);
      const versiculo = Number(document.getElementById('versiculo').value);

      const estudo = buscarEstudo(livro, capitulo, versiculo);
      if (!estudo) {
        mostrarNaoEncontrado(livro, capitulo, versiculo);
        return;
      }

      const resultado = document.getElementById('resultado');
      resultado.innerHTML = 'Abrindo <strong>' + estudo.titulo + '</strong>...';
      window.location.href = buildStudyHref(estudo);
    });

    async function initAuthAndLoad() {
      if (supaClient) {
        try {
          const sess = await supaClient.auth.getSession();
          currentUser = (sess && sess.data && sess.data.session) ? sess.data.session.user : null;
        } catch (e) {
          currentUser = null;
        }

        supaClient.auth.onAuthStateChange(async function (_event, session) {
          currentUser = session ? session.user : null;
          await refreshCompletions();
          renderListaEstudos();
        });
      }

      await carregarIndice();
    }

    initAuthAndLoad().catch(err => {
      document.getElementById('resultado').textContent = err.message;
    });
  </script>
</body>
</html>
